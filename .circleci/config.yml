version: 2.1

# Krita for iOS / iPadOS — Phase 0 build (CircleCI).
#
# Cross-compiles Krita on a macOS executor via packaging/ios/build-krita-ios.sh
# — the same orchestrator used locally and on other runners (see
# packaging/ios/ci.md). CircleCI's macOS executor requires a plan with macOS
# minutes/credits.
#
# Honest status: the dependency superbuild is partial and Qt is stock, so a
# finished krita.app is not expected yet; the orchestrator reports how far it
# got and exits cleanly. Any produced .ipa is stored as a build artifact.

jobs:
  build-ios:
    macos:
      # Adjust to an available Xcode image as new versions land.
      xcode: "15.4.0"
    resource_class: macos.m1.medium.gen1   # Apple silicon
    environment:
      PLATFORM: OS64
      DEPLOYMENT_TARGET: "16.0"
      QT_VERSION: "6.7.3"
    steps:
      - checkout

      - run:
          name: Install host tools
          command: |
            brew install ninja cmake
            python3 -m pip install --break-system-packages aqtinstall

      # Host (desktop-macOS) Qt for moc/rcc/uic + the iOS target Qt, same version.
      - restore_cache:
          keys:
            - qt-{{ .Environment.QT_VERSION }}-mac-ios-v1
      - run:
          name: Install Qt (host + iOS)
          command: |
            if [ ! -d "$HOME/Qt/${QT_VERSION}/ios" ]; then
              python3 -m aqt install-qt mac desktop ${QT_VERSION} -O "$HOME/Qt"
              python3 -m aqt install-qt mac ios ${QT_VERSION} \
                -m qtshadertools qtimageformats qt5compat -O "$HOME/Qt"
            fi
      - save_cache:
          key: qt-{{ .Environment.QT_VERSION }}-mac-ios-v1
          paths:
            - ~/Qt

      # Cross-compiled dependency prefix; the orchestrator auto-skips the
      # dependency build when this is already populated.
      - restore_cache:
          keys:
            - ios-deps-OS64-{{ checksum "packaging/ios/3rdparty-ios/CMakeLists.txt" }}
      - run:
          name: Build Krita (deps + configure + build + package)
          command: |
            export QT_HOST_PATH="$HOME/Qt/${QT_VERSION}/macos"
            export QT_IOS_ROOT="$HOME/Qt/${QT_VERSION}/ios"
            export WORK="$PWD/_ios"
            bash packaging/ios/build-krita-ios.sh
      - save_cache:
          key: ios-deps-OS64-{{ checksum "packaging/ios/3rdparty-ios/CMakeLists.txt" }}
          paths:
            - _ios/deps-OS64

      - run:
          name: Collect artifacts
          command: |
            mkdir -p /tmp/ios-artifacts
            cp _ios/krita-unsigned-*.ipa /tmp/ios-artifacts/ 2>/dev/null \
              || echo "no .ipa produced yet (expected during Phase 0)"
      - store_artifacts:
          path: /tmp/ios-artifacts
          destination: ios

workflows:
  ios:
    jobs:
      - build-ios
