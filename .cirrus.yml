# Cirrus CI — Krita for iOS / iPadOS (Phase 0).
#
# Cross-compiles Krita on a macOS VM via packaging/ios/build-krita-ios.sh — the
# same orchestrator used locally and on other runners (see packaging/ios/ci.md).
# Cirrus CI offers free macOS compute for public repositories.
#
# Honest status: the dependency superbuild is partial and Qt is stock, so the
# build is not expected to produce a finished krita.app yet; the orchestrator
# reports how far it got and exits cleanly. Each Phase-0 commit gets further.

ios_task:
  name: Krita iOS (OS64)

  macos_instance:
    # Pick an available cirruslabs image; bump the tag as new macOS/Xcode land.
    # https://github.com/cirruslabs/macos-image-templates
    image: ghcr.io/cirruslabs/macos-runner:sequoia

  env:
    PLATFORM: OS64
    DEPLOYMENT_TARGET: "16.0"
    QT_VERSION: "6.7.3"
    QT_ROOT: ${HOME}/Qt
    WORK: ${CIRRUS_WORKING_DIR}/_ios

  tools_script:
    - brew update
    - brew install ninja cmake
    - python3 -m pip install --break-system-packages aqtinstall

  # Host (desktop-macOS) Qt for moc/rcc/uic + the iOS target Qt, same version.
  qt_cache:
    folder: ${HOME}/Qt
    fingerprint_script: echo "qt-${QT_VERSION}-mac-ios"
    populate_script:
      - python3 -m aqt install-qt mac desktop ${QT_VERSION} -O ${QT_ROOT}
      - python3 -m aqt install-qt mac ios ${QT_VERSION} -m qtshadertools qtimageformats qt5compat -O ${QT_ROOT}

  # Cross-compiled dependency prefix; the orchestrator auto-skips the dependency
  # build when this is already populated.
  deps_cache:
    folder: ${CIRRUS_WORKING_DIR}/_ios/deps-${PLATFORM}
    fingerprint_script:
      - echo "ios-deps-${PLATFORM}"
      - shasum packaging/ios/3rdparty-ios/CMakeLists.txt

  build_script:
    - export QT_HOST_PATH=${QT_ROOT}/${QT_VERSION}/macos
    - export QT_IOS_ROOT=${QT_ROOT}/${QT_VERSION}/ios
    - bash packaging/ios/build-krita-ios.sh

  ipa_artifacts:
    path: "_ios/krita-unsigned-*.ipa"

# To also build for the Simulator, duplicate the task with PLATFORM: SIMULATORARM64
# and QT install target `ios` (the simulator slice ships in the same iOS Qt), or
# turn PLATFORM into a matrix:
#   env:
#     matrix:
#       - PLATFORM: OS64
#       - PLATFORM: SIMULATORARM64
