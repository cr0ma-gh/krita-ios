# Krita for iOS / iPadOS — Phase 0 build (GitHub Actions).
#
# Free macOS runners for PUBLIC repositories. The build logic lives in
# packaging/ios/build-krita-ios.sh so the same build runs locally or on any
# other runner (see packaging/ios/ci.md). This YAML is just the GitHub glue.
#
# Honest status: the dependency superbuild is partial and Qt is stock, so the
# build is not expected to produce a finished krita.app yet — the orchestrator
# reports how far it got and exits cleanly. Any .ipa is uploaded as an artifact.
#
# Triggers on push to main/ios branches, or manually (workflow_dispatch).

name: iOS build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform"
        type: choice
        default: OS64
        options: [OS64, SIMULATORARM64]
  push:
    branches: [ main, ios, ios-** ]

permissions:
  contents: read

jobs:
  build:
    name: Krita iOS (${{ github.event.inputs.platform || 'OS64' }})
    runs-on: macos-14            # Apple silicon; free for public repos
    env:
      PLATFORM: ${{ github.event.inputs.platform || 'OS64' }}
      DEPLOYMENT_TARGET: "16.0"
      QT_VERSION: "6.9.1"
      WORK: ${{ github.workspace }}/_ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install host tools
        run: brew install ninja cmake

      # Qt6 cross-compilation needs BOTH a host (desktop-macOS) Qt for
      # moc/rcc/uic and the iOS target Qt. Install both; remember their paths.
      - name: Install host Qt (macOS)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
      - run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      - name: Install Qt for iOS
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: ios
          modules: qtshadertools qtimageformats qt5compat
      - run: echo "QT_IOS_ROOT=$QT_ROOT_DIR" >> "$GITHUB_ENV"

      # Cross-compiled dependency prefix; the orchestrator auto-skips the
      # dependency build when this is already populated.
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.WORK }}/deps-${{ env.PLATFORM }}
          # Only the dependency definitions invalidate the cache — not the
          # orchestrator/docs — so Krita-configure/compile iterations stay fast.
          key: ios-deps-${{ env.PLATFORM }}-${{ hashFiles('packaging/ios/3rdparty-ios/**', 'packaging/ios/host-tools/**', 'cmake/modules/ios.toolchain.cmake') }}

      # Krita build dir, kept across runs so ninja recompiles incrementally
      # during the compile phase (only the files a fix touched).
      - name: Cache Krita build dir
        uses: actions/cache@v4
        with:
          path: ${{ env.WORK }}/build-${{ env.PLATFORM }}
          key: ios-kbuild-${{ env.PLATFORM }}-${{ github.run_id }}
          restore-keys: ios-kbuild-${{ env.PLATFORM }}-

      - name: Build Krita (deps + configure + build + package)
        run: |
          mkdir -p "$WORK"
          # Tee the orchestrator output to a log so it can be inspected as an
          # artifact (readable anonymously, unlike the auth-gated job logs).
          bash packaging/ios/build-krita-ios.sh 2>&1 | tee "$WORK/build.log"
        continue-on-error: true   # expected until the deps DAG + patched Qt land

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: krita-ios-${{ env.PLATFORM }}
          path: |
            ${{ env.WORK }}/build.log
            ${{ env.WORK }}/krita-unsigned-*.ipa
          if-no-files-found: warn
